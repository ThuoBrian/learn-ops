# Learning Scanner Configuration — learn-ops
# Used by `node scan.mjs` (and /learn-ops learn-scan) to discover FREE AI/ML and
# cybersecurity trainings. Schema reuses the tracked_companies/title_filter pattern (topic filter via title_filter)
# so scan.mjs works unchanged: title_filter acts as the topic filter; providers
# only return free / free-via-aid / scholarship items, so no salary/location filter
# is needed. `location` on each record carries the cost_tier (free|free-via-aid|scholarship).

# ── Topic filter (reuses scan.mjs title_filter) ─────────────────────────
# Keep courses whose title contains any positive keyword and no negative keyword.
title_filter:
  positive:
    - "Machine Learning"
    - "Deep Learning"
    - "AI"
    - "LLM"
    - "RAG"
    - "MLOps"
    - "TensorFlow"
    - "PyTorch"
    - "Pandas"
    - "Python"
    - "SQL"
    - "Data Visualization"
    - "Feature Engineering"
    - "Computer Vision"
    - "NLP"
    - "Natural Language Processing"
    - "Reinforcement Learning"
    - "Time Series"
    - "Cybersecurity"
    - "Security"
    - "SQL injection"
    - "XSS"
    - "CSRF"
    - "SSRF"
    - "Penetration"
    - "Web Security"
    - "Authentication"
    - "Access Control"
    - "Ethics"
    # Generative AI / LLM tooling
    - "Generative"
    - "SageMaker"
    - "Bedrock"
    - "Agents"
    - "Embeddings"
    - "Fine-tuning"
    - "Inference"
    # SRE / cloud engineering track
    - "Site Reliability"
    - "SRE"
    - "Kubernetes"
    - "Terraform"
    - "Infrastructure as Code"
    - "Cloud Architecture"
    - "Cloud Engineering"
    - "DevOps"
    - "Observability"
    - "Monitoring"
  negative:
    - "Paid"
    - "Premium"
    - "Masterclass"
    - "Guaranteed Job"

# ── Tracked learning sources (reuses scan.mjs tracked_companies) ────────
# `provider:` forces a specific provider (bypasses detect()). `cost_tier` is an
# arbitrary field scan.mjs ignores; providers set it on each record.
tracked_companies:
  # --- AI/ML ---
  - name: Kaggle Learn
    careers_url: https://www.kaggle.com/learn
    provider: kaggle
    cost_tier: free
    enabled: true

  - name: Coursera (free audit — AI/ML + Cyber)
    careers_url: https://www.coursera.org/browse/data-science/machine-learning
    provider: coursera
    cost_tier: free-via-aid
    enabled: true

  - name: DeepLearning.AI Short Courses
    careers_url: https://www.deeplearning.ai/courses/
    provider: deeplearning
    cost_tier: free
    enabled: true

  - name: AWS Skill Builder (Free AI/ML)
    careers_url: https://skillbuilder.aws/
    provider: aws-skillbuilder
    cost_tier: free
    enabled: true

  - name: MIT OCW (AI/ML)
    careers_url: https://ocw.mit.edu/search/?q=machine+learning&type=course
    provider: mit-ocw
    cost_tier: free
    enabled: true

  # --- Cybersecurity ---
  - name: PortSwigger Web Security Academy
    careers_url: https://portswigger.net/web-security/all-labs
    provider: portswigger
    cost_tier: free
    enabled: true

  - name: TryHackMe (Free Paths)
    careers_url: https://tryhackme.com/paths
    provider: tryhackme
    cost_tier: free
    enabled: true

# ── WebSearch handoff queries (Level 3) ─────────────────────────────────
# Sources scan.mjs can't hit via a provider are discovered via WebSearch.
search_queries:
  - name: Free AI/ML courses — Fast.ai / DeepLearning.AI
    query: 'site:fast.ai OR site:deeplearning.ai "free" course machine learning OR deep learning'
    enabled: true

  - name: Free cybersecurity training — TryHackMe / ISC2 CC
    query: '"free" cybersecurity course OR certification "ISC2" OR "TryHackMe" OR "Professor Messer"'
    enabled: true

  - name: Free AI/ML university courses — MIT OCW / Stanford
    query: 'site:ocw.mit.edu OR site:cs.stanford.edu "machine learning" OR "deep learning" free'
    enabled: true

  - name: Free AI/ML + cybersecurity scholarships
    query: '"scholarship" "AI" OR "machine learning" OR "cybersecurity" free training 2026'
    enabled: true

  - name: Free cloud and SRE training — Linux Foundation / CNCF
    query: '"free" site:training.linuxfoundation.org OR site:academy.cncf.io "Kubernetes" OR "SRE" OR "cloud native"'
    enabled: true

  - name: Free cloud engineering courses — Google Cloud / Microsoft Learn / AWS
    query: '"free" "cloud engineering" OR "site reliability" OR "SRE" course 2026 "Google Cloud" OR "Azure" OR "AWS"'
    enabled: true